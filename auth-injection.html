<style>
.auth-panel-btn{font-family:VT323,monospace;font-size:1.45rem;background:rgba(24,24,27,.86);border:2px solid var(--gold);border-radius:999px;padding:.45rem .95rem;color:var(--gold);box-shadow:0 0 25px rgba(251,191,36,.18);cursor:pointer}.auth-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:10000;align-items:center;justify-content:center;padding:1rem}.auth-card{background:#18181b;border:5px solid var(--main);border-radius:24px;padding:1.4rem;width:min(92vw,440px);box-shadow:0 0 55px rgba(0,0,0,.6)}.auth-card h2{font-size:3rem;color:var(--main);text-align:center;margin:.2rem 0 1rem}.auth-card input{width:100%;font-family:VT323,monospace;font-size:1.5rem;background:#09090b;color:white;border:2px solid #3f3f46;border-radius:14px;padding:.85rem;margin:.4rem 0}.auth-card button{width:100%;font-size:1.6rem;border-radius:14px;padding:.85rem;margin:.4rem 0;background:var(--main);color:#050505}.auth-card .ghost{background:#27272a;color:white;border:2px solid #3f3f46}.auth-msg{font-size:1.3rem;text-align:center;color:var(--gold);min-height:1.5rem}.leader-row{display:grid;grid-template-columns:44px 1fr 70px 80px;gap:.4rem;align-items:center;font-size:1.4rem;border-bottom:1px solid #333;padding:.45rem 0}.leader-head{color:var(--gold)}.leader-self{border:2px solid var(--gold);border-radius:14px;padding:.7rem;margin:.7rem 0;color:var(--gold);font-size:1.5rem;text-align:center}.account-chip{color:var(--gold);font-size:1.35rem;align-self:center}
</style>
<div id="auth-overlay" class="auth-overlay"><div class="auth-card"><h2 id="auth-title">LOGIN</h2><input id="auth-username" placeholder="username" autocomplete="username"><input id="auth-password" placeholder="password" type="password" autocomplete="current-password"><div class="auth-msg" id="auth-msg"></div><button onclick="authSubmit()" id="auth-submit">LOGIN</button><button onclick="toggleAuthMode()" class="ghost" id="auth-switch">Need an account? Sign up</button><button onclick="closeAuth()" class="ghost">CLOSE</button></div></div>
<div id="leader-overlay" class="auth-overlay"><div class="auth-card" style="width:min(92vw,560px)"><h2>LEADERBOARD</h2><div id="my-rank" class="leader-self">Login to see your rank.</div><div class="leader-row leader-head"><span>#</span><span>USER</span><span>WPM</span><span>SCORE</span></div><div id="leader-list"></div><button onclick="loadLeaderboard()">REFRESH</button><button onclick="closeLeaderboard()" class="ghost">CLOSE</button></div></div>
<script>
(function(){
let signupMode=false,gameWasRunningBeforeOverlay=true;const tokenKey='nitroToken',userKey='nitroUser';window.currentNitroUser=localStorage.getItem(userKey)||'';
function overlayOpen(){gameWasRunningBeforeOverlay=typeof gameRunning==='undefined'?true:gameRunning;if(typeof gameRunning!=='undefined')gameRunning=false;}
function overlayClose(){const a=document.getElementById('auth-overlay')?.style.display==='flex';const b=document.getElementById('leader-overlay')?.style.display==='flex';if(!a&&!b&&typeof gameRunning!=='undefined')gameRunning=gameWasRunningBeforeOverlay;}
function stopGameTyping(e){if(e.target&&(e.target.closest('#auth-overlay')||e.target.closest('#leader-overlay'))){e.stopPropagation();}}
document.addEventListener('keydown',stopGameTyping,true);document.addEventListener('keypress',stopGameTyping,true);document.addEventListener('keyup',stopGameTyping,true);
function addAuthButtons(){const top=document.querySelector('.top-actions');if(!top||document.getElementById('login-btn'))return;const chip=document.createElement('span');chip.id='account-chip';chip.className='account-chip';chip.textContent=window.currentNitroUser?'👤 '+window.currentNitroUser:'Guest';const login=document.createElement('button');login.id='login-btn';login.type='button';login.className='auth-panel-btn';login.textContent=window.currentNitroUser?'🚪 LOGOUT':'🔐 LOGIN';login.onclick=function(){window.currentNitroUser?logout():openAuth(false)};const board=document.createElement('button');board.type='button';board.className='auth-panel-btn';board.textContent='🏁 LEADERBOARD';board.onclick=openLeaderboard;top.prepend(board);top.prepend(login);top.prepend(chip)}
function updateAccountUI(){const chip=document.getElementById('account-chip'),btn=document.getElementById('login-btn');if(chip)chip.textContent=window.currentNitroUser?'👤 '+window.currentNitroUser:'Guest';if(btn)btn.textContent=window.currentNitroUser?'🚪 LOGOUT':'🔐 LOGIN'}
window.openAuth=function(signup=false){signupMode=signup;overlayOpen();document.getElementById('auth-overlay').style.display='flex';renderAuthMode();setTimeout(()=>document.getElementById('auth-username')?.focus(),50)};window.closeAuth=function(){document.getElementById('auth-overlay').style.display='none';overlayClose()};window.toggleAuthMode=function(){signupMode=!signupMode;renderAuthMode()};
function renderAuthMode(){document.getElementById('auth-title').textContent=signupMode?'SIGN UP':'LOGIN';document.getElementById('auth-submit').textContent=signupMode?'CREATE ACCOUNT':'LOGIN';document.getElementById('auth-switch').textContent=signupMode?'Already have an account? Login':'Need an account? Sign up';document.getElementById('auth-msg').textContent=''}function setAuthMsg(m){document.getElementById('auth-msg').textContent=m}
window.authSubmit=async function(){const username=document.getElementById('auth-username').value.trim(),password=document.getElementById('auth-password').value;if(username.length<3||password.length<4){setAuthMsg('Use 3+ letters and 4+ password characters.');return}try{const res=await fetch(signupMode?'/signup':'/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});const data=await res.json();if(!res.ok){setAuthMsg(data.message||'Something went wrong.');return}if(signupMode){setAuthMsg('Account made. Now login.');signupMode=false;renderAuthMode();return}localStorage.setItem(tokenKey,data.token);localStorage.setItem(userKey,data.username);window.currentNitroUser=data.username;if(typeof highScore!=='undefined')highScore=Math.max(highScore,Number(data.highScore||0));if(typeof bestWPM!=='undefined')bestWPM=Math.max(bestWPM,Number(data.bestWPM||0));if(typeof highScoreEl!=='undefined'&&highScoreEl)highScoreEl.textContent=String(highScore);updateAccountUI();closeAuth();loadLeaderboard();if(typeof toast==='function')toast('Logged in as '+data.username)}catch(e){setAuthMsg('Server not ready yet.')}};
window.logout=function(){localStorage.removeItem(tokenKey);localStorage.removeItem(userKey);window.currentNitroUser='';updateAccountUI();if(typeof toast==='function')toast('Logged out.')};
window.submitScoreOnline=async function(){const token=localStorage.getItem(tokenKey);if(!token)return;const accuracy=totalAttempts>0?Math.round((totalCorrectChars/totalAttempts)*100):100;const score=Math.floor(totalEffective*100+bestWPM*10+maxCombo*5-totalMistakes*8);try{await fetch('/submit-score',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({wpm:bestWPM,score,accuracy})});loadLeaderboard()}catch(e){}};
window.openLeaderboard=function(){overlayOpen();document.getElementById('leader-overlay').style.display='flex';loadLeaderboard()};window.closeLeaderboard=function(){document.getElementById('leader-overlay').style.display='none';overlayClose()};window.loadLeaderboard=async function(){try{const res=await fetch('/leaderboard'),list=await res.json();document.getElementById('leader-list').innerHTML=list.map((u,i)=>'<div class="leader-row"><span>'+(i+1)+'</span><span>'+escapeHtml(u.username)+'</span><span>'+Math.round(u.bestWPM||0)+'</span><span>'+Math.round(u.highScore||0)+'</span></div>').join('')||'<div class="auth-msg">No scores yet.</div>';if(window.currentNitroUser){const r=await fetch('/rank/'+encodeURIComponent(window.currentNitroUser)),rank=await r.json();document.getElementById('my-rank').textContent='YOUR RANK: #'+(rank.rank||'?')+' • '+window.currentNitroUser}else document.getElementById('my-rank').textContent='Login to see your rank.'}catch(e){document.getElementById('leader-list').innerHTML='<div class="auth-msg">Leaderboard unavailable.</div>'}};
function escapeHtml(s){return String(s).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
window.addEventListener('load',function(){addAuthButtons();updateAccountUI();const oldWin=window.showWinModal;if(typeof oldWin==='function')window.showWinModal=function(){oldWin();submitScoreOnline()}});
})();
</script>
