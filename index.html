<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NITRO METER</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        body { font-family: 'VT323', monospace; background: #050505; color: white; margin: 0; padding: 0; overflow: hidden; }
        .screen { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .screen.active { display: flex; }
        .neon-green { color: #10f070; text-shadow: 0 0 25px #10f070; }
        .neon-purple { color: #c026d3; text-shadow: 0 0 25px #c026d3; }
        input { background: #111; border: 4px solid #10f070; color: white; font-size: 2.4rem; padding: 25px 40px; width: 520px; border-radius: 16px; outline: none; margin-bottom: 25px; }
        button { font-size: 2.8rem; padding: 25px 80px; border-radius: 16px; cursor: pointer; transition: all 0.2s; }
    </style>
</head>
<body>

    <!-- AUTH SCREEN -->
    <div id="auth-screen" class="screen active">
        <div class="text-center mb-12">
            <div class="flex justify-center mb-8"><div class="w-32 h-32 bg-[#10f070] rounded-3xl flex items-center justify-center text-8xl shadow-[0_0_70px_#10f070]">⚡</div></div>
            <div class="text-8xl font-bold neon-green tracking-widest">NITRO METER</div>
        </div>

        <div class="bg-zinc-950 border-8 border-[#10f070] rounded-3xl p-16 w-full max-w-2xl">
            <div id="auth-title" class="text-6xl neon-green text-center mb-12">LOG IN</div>

            <div class="flex gap-8 mb-12">
                <button onclick="selectMode(0)" id="login-tab" class="flex-1 py-6 text-4xl border-4 border-[#10f070] bg-[#10f070] text-black rounded-2xl">LOG IN</button>
                <button onclick="selectMode(1)" id="signup-tab" class="flex-1 py-6 text-4xl border-4 border-white/30 rounded-2xl">SIGN UP</button>
            </div>

            <input id="username" placeholder="USERNAME" autocomplete="off"><br>
            <input id="password" type="password" placeholder="PASSWORD" autocomplete="off"><br>

            <button onclick="handleDone()" class="mt-10 w-full bg-[#10f070] text-black hover:scale-105 text-4xl py-8">DONE</button>
        </div>

        <div id="auth-msg" class="mt-12 text-3xl min-h-[60px] text-center"></div>
    </div>

    <!-- MENU SCREEN -->
    <div id="menu-screen" class="screen">
        <div class="text-center">
            <div class="flex justify-center mb-6"><div class="w-28 h-28 bg-[#10f070] rounded-3xl flex items-center justify-center text-8xl shadow-[0_0_60px] shadow-[#10f070]">⚡</div></div>
            <div class="text-7xl neon-green tracking-widest">NITRO METER</div>
            <div class="text-4xl mt-6">Welcome back, <span id="menu-username" class="neon-purple"></span></div>
        </div>

        <div class="grid grid-cols-2 gap-12 mt-20 w-full max-w-5xl px-10">
            <button onclick="startGame()" class="bg-[#10f070] hover:bg-white text-black py-20 text-5xl rounded-3xl">▶ START TYPING</button>
            <button onclick="showLeaderboard()" class="border-8 border-[#c026d3] hover:bg-[#c026d3] py-20 text-5xl rounded-3xl">🏆 GLOBAL LEADERBOARD</button>
            <button onclick="showStats()" class="border-8 border-amber-400 hover:bg-amber-400 py-20 text-5xl rounded-3xl">📊 YOUR STATS</button>
            <button onclick="showUpdates()" class="border-8 border-cyan-400 hover:bg-cyan-400 py-20 text-5xl rounded-3xl">📜 UPDATES</button>
        </div>
        <button onclick="logout()" class="mt-20 text-3xl text-red-400">LOG OUT</button>
    </div>

    <!-- LEADERBOARD -->
    <div id="leaderboard-screen" class="screen bg-black/95">
        <div class="text-6xl neon-purple mb-10">NITRO HALL OF FAME</div>
        <table id="global-leaderboard" class="text-4xl w-[1000px]"></table>
        <button onclick="hideLeaderboard()" class="mt-12 px-20 py-8 text-3xl border-4 border-white/50 rounded-3xl">BACK</button>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyBj2JW101deM4Km1InqSB8VVqM_LdROAQQ",
          authDomain: "wpmtest-ba4f2.firebaseapp.com",
          projectId: "wpmtest-ba4f2",
          storageBucket: "wpmtest-ba4f2.firebasestorage.app",
          messagingSenderId: "822453718288",
          appId: "1:822453718288:web:54880852639ab725d36995",
          measurementId: "G-M8DY79KMK7"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUser = null;
        let currentMode = 0; // 0 = login, 1 = signup

        function selectMode(mode) {
            currentMode = mode;
            document.getElementById('auth-title').textContent = mode === 0 ? "LOG IN" : "SIGN UP";
            const loginTab = document.getElementById('login-tab');
            const signupTab = document.getElementById('signup-tab');
            if (mode === 0) {
                loginTab.classList.add('bg-[#10f070]', 'text-black');
                signupTab.classList.remove('bg-[#10f070]', 'text-black');
            } else {
                signupTab.classList.add('bg-[#10f070]', 'text-black');
                loginTab.classList.remove('bg-[#10f070]', 'text-black');
            }
        }

        function handleDone() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const msg = document.getElementById('auth-msg');

            if (!username || !password) return msg.textContent = "USERNAME AND PASSWORD REQUIRED";

            if (currentMode === 1) { // SIGN UP
                db.ref('users/' + username).once('value', snap => {
                    if (snap.exists()) msg.textContent = "USERNAME ALREADY TAKEN";
                    else {
                        db.ref('users/' + username).set({ password: password });
                        successLogin(username);
                    }
                });
            } else { // LOG IN
                db.ref('users/' + username).once('value', snap => {
                    const data = snap.val();
                    if (data && data.password === password) successLogin(username);
                    else msg.textContent = "WRONG USERNAME OR PASSWORD";
                });
            }
        }

        function successLogin(username) {
            currentUser = username;
            document.getElementById('menu-username').textContent = username;
            document.getElementById('auth-msg').textContent = "";
            document.getElementById('username').value = "";
            document.getElementById('password').value = "";
            switchScreen('menu-screen');
        }

        function logout() { currentUser = null; switchScreen('auth-screen'); }
        function switchScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function showLeaderboard() {
            switchScreen('leaderboard-screen');
            db.ref('leaderboard').orderByChild('wpm').limitToLast(10).once('value', snap => {
                let html = `<tr class="text-cyan-400"><th class="text-left py-4">RANK</th><th class="text-left">PLAYER</th><th class="text-right">WPM</th></tr>`;
                let rank = 1;
                snap.forEach(child => {
                    const d = child.val();
                    html += `<tr class="border-t border-gray-700"><td class="py-5">#${rank++}</td><td>${d.username}</td><td class="text-right text-[#10f070]">${d.wpm}</td></tr>`;
                });
                document.getElementById('global-leaderboard').innerHTML = html || "<tr><td colspan='3' class='py-20 text-center'>No scores yet. Be the first!</td></tr>";
            });
        }

        function hideLeaderboard() { switchScreen('menu-screen'); }
        function startGame() { alert("Game starting... (full typing game will be added next)"); }
        function showStats() { alert("Your Stats"); }
        function showUpdates() { alert("April 14, 2026 — Nitro Meter Launched!"); }

        window.onload = () => {
            selectMode(0);
            console.log("%cNITRO METER LIVE — Real Global Leaderboard Connected", "color:#10f070; font-size:20px");
        };
    </script>
</body>
</html>
