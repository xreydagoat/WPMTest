<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NITRO METER • Type → Fill → Dominate</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        :root {
            --emerald: #10b981;
        }

        body {
            font-family: 'VT323', monospace;
            background: #09090b;
            color: white;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        .char {
            transition: all 0.05s ease;
            padding: 1px 3px;
            border-radius: 3px;
            display: inline;
            font-size: inherit;
        }

        .correct {
            color: #10b981 !important;
            background: rgba(16, 185, 129, 0.25);
        }

        .incorrect {
            color: #ef4444 !important;
            background: rgba(239, 68, 68, 0.35);
            animation: shake 0.3s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 2px solid #27272a;
        }

        #sentence-display {
            min-height: 240px;
            font-size: 2.25rem;
            line-height: 1.55;
            letter-spacing: 1px;          /* LETTERS NOW MUCH CLOSER */
            white-space: pre-wrap;
            word-break: normal;
            overflow-wrap: normal;
        }

        .meter-fill {
            transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
    </style>
</head>
<body>
    <div class="container">
        
        <!-- HEADER -->
        <div class="header">
            <div style="display:flex; align-items:center; gap:1rem;">
                <div style="width:60px; height:60px; background:#10b981; border-radius:16px; display:flex; align-items:center; justify-content:center; font-size:2.5rem; box-shadow:0 0 30px #10b98180;">⚡</div>
                <div>
                    <h1 style="font-size:3.5rem; font-weight:bold; letter-spacing:4px; color:#10b981; margin:0;">NITRO METER</h1>
                    <p style="font-size:1.5rem; color:#a1a1aa; margin:-8px 0 0 0;">type sentences • fill the meter • never downgrade</p>
                </div>
            </div>

            <div style="display:flex; gap:2.5rem; font-size:1.8rem;">
                <div style="text-align:right;">
                    <div style="font-size:0.9rem; color:#10b981; letter-spacing:2px;">LIVE WPM</div>
                    <div id="live-wpm-value" style="font-size:3rem; font-weight:bold;">000</div>
                </div>
                <div style="text-align:right;">
                    <div style="font-size:0.9rem; color:#fbbf24; letter-spacing:2px;">AVG WPM</div>
                    <div id="avg-wpm-value" style="font-size:3rem; font-weight:bold;">008</div>
                </div>
                <div style="text-align:right;">
                    <div style="font-size:0.9rem; color:#c084fc; letter-spacing:2px;">TIER</div>
                    <div id="tier-name" style="font-size:2.2rem; font-weight:bold; color:#c084fc;">ROOKIE</div>
                </div>
            </div>

            <div style="display:flex; gap:1rem;">
                <button onclick="showLeaderboard()" 
                        style="padding:1rem 1.8rem; font-size:1.6rem; background:#18181b; border:2px solid #c084fc; border-radius:9999px; cursor:pointer; transition:all 0.2s; display:flex; align-items:center; gap:8px;">
                    🏆 LEADERBOARD
                </button>
                <button onclick="resetGame()" 
                        style="padding:1rem 2rem; font-size:1.5rem; background:#18181b; border:2px solid #3f3f46; border-radius:9999px; cursor:pointer; transition:all 0.2s;">
                    RESET RUN
                </button>
            </div>
        </div>

        <!-- METER -->
        <div style="background:#18181b; border:4px solid #10b981; border-radius:24px; padding:2rem; margin-bottom:3rem; box-shadow:0 0 40px rgba(16,185,129,0.3);">
            <div style="display:flex; justify-content:space-between; margin-bottom:1rem; font-size:1.8rem;">
                <div style="color:#10b981;">METER LEVEL</div>
                <div style="display:flex; gap:2rem; color:#d1d5db;">
                    <div id="sentences-typed">0 sentences</div>
                    <div id="effective-units" style="color:#fbbf24;">0 effective</div>
                    <div id="progress-percent" style="font-size:2.5rem; font-weight:bold; color:white;">0%</div>
                </div>
            </div>
            
            <div style="height:52px; background:#09090b; border:2px solid #3f3f46; border-radius:9999px; overflow:hidden; position:relative;">
                <div id="meter-fill" class="meter-fill" 
                     style="height:100%; width:0%; background:linear-gradient(to right, #10b981, #67e8f9);"></div>
            </div>
        </div>

        <!-- TYPING AREA -->
        <div style="background:#18181b; border:2px solid #3f3f46; border-radius:24px; padding:3rem;">
            <div id="sentence-display"></div>

            <div style="margin-top:2.5rem; display:flex; justify-content:space-between; font-size:1.4rem; color:#a1a1aa;">
                <div>Accuracy: <span id="accuracy" style="color:#10b981; font-weight:bold;">100%</span></div>
                <div id="status-text" style="color:#fbbf24;">Waiting for first keystroke...</div>
                <div>Press any key to begin</div>
            </div>
        </div>
    </div>

    <!-- WIN MODAL -->
    <div id="win-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); align-items:center; justify-content:center; z-index:1000;">
        <div style="background:#18181b; border:4px solid #10b981; border-radius:24px; max-width:520px; width:90%; padding:3rem; text-align:center;">
            <div style="font-size:6rem; margin-bottom:1rem;">🏆</div>
            <h2 style="font-size:3.5rem; color:#10b981; margin:0 0 1rem 0;">METER FILLED!</h2>
            <div id="win-text" style="font-size:2rem; margin:1.5rem 0;"></div>
            
            <div style="display:flex; gap:1rem; margin-top:2rem;">
                <button onclick="saveScoreAndReset()" 
                        style="flex:1; padding:1.4rem; font-size:1.8rem; background:#10b981; color:#000; border:none; border-radius:9999px; cursor:pointer; font-weight:bold;">
                    💾 SAVE TO LEADERBOARD
                </button>
                <button onclick="hideWinModal(); resetGame()" 
                        style="flex:1; padding:1.4rem; font-size:1.8rem; background:#27272a; color:white; border:2px solid #3f3f46; border-radius:9999px; cursor:pointer;">
                    NEW RUN
                </button>
            </div>
        </div>
    </div>

    <!-- LEADERBOARD MODAL -->
    <div id="leaderboard-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); align-items:center; justify-content:center; z-index:1000;">
        <div style="background:#18181b; border:4px solid #c084fc; border-radius:24px; max-width:820px; width:95%; max-height:90vh; overflow:auto; padding:2.5rem;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem;">
                <h2 style="font-size:3rem; color:#c084fc; margin:0;">🏆 NITRO HALL OF FAME</h2>
                <button onclick="hideLeaderboard()" 
                        style="font-size:2rem; background:none; border:none; color:#ef4444; cursor:pointer;">✕</button>
            </div>
            
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:3rem;">
                <!-- GLOBAL -->
                <div>
                    <h3 style="color:#67e8f9; font-size:1.8rem; margin:0 0 1rem 0; border-bottom:2px solid #67e8f9; padding-bottom:8px;">GLOBAL TOP TYPERS</h3>
                    <table id="global-table" style="width:100%; border-collapse:collapse; font-size:1.6rem;"></table>
                </div>
                
                <!-- PERSONAL -->
                <div>
                    <h3 style="color:#fbbf24; font-size:1.8rem; margin:0 0 1rem 0; border-bottom:2px solid #fbbf24; padding-bottom:8px;">YOUR PERSONAL BESTS</h3>
                    <table id="personal-table" style="width:100%; border-collapse:collapse; font-size:1.6rem;"></table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== GAME DATA ====================
        const sentences = [
            "The quick brown fox jumps over the lazy dog.",
            "Typing is a valuable skill in the modern world.",
            "Practice makes perfect when it comes to typing.",
            "The sun sets in the west every evening.",
            "She sells seashells by the seashore.",
            "A journey of a thousand miles begins with one step.",
            "To be or not to be, that is the question.",
            "What time is it? It's time to type faster!",
            "Although it was difficult, she succeeded anyway.",
            "He said, \"I can't believe how fast you're typing!\"",
            "Punctuation, capitals, and numbers: 1, 2, 3 – let's go!",
            "Success is not final, failure is not fatal.",
            "In the middle of every difficulty lies opportunity.",
            "The only way to do great work is to love what you do.",
            "The future belongs to those who believe in the beauty of their dreams."
        ];

        // Fake global leaderboard (always the same)
        const globalLeaders = [
            { rank: 1, name: "SHADOWTYPE", wpm: 148, date: "APR 13" },
            { rank: 2, name: "BLAZETYPER", wpm: 139, date: "APR 12" },
            { rank: 3, name: "VOIDWPM", wpm: 134, date: "APR 14" },
            { rank: 4, name: "NITROKING", wpm: 128, date: "APR 10" },
            { rank: 5, name: "XREY", wpm: 125, date: "APR 14" },
            { rank: 6, name: "PHANTOM88", wpm: 119, date: "APR 11" },
            { rank: 7, name: "SPEEDDEMON", wpm: 115, date: "APR 09" },
            { rank: 8, name: "QUICKFIRE", wpm: 112, date: "APR 13" },
            { rank: 9, name: "LEGENDRY", wpm: 108, date: "APR 14" },
            { rank: 10, name: "TURBOFINGERS", wpm: 105, date: "APR 12" }
        ];

        let maxAverageWPM = 8;
        let totalCorrectChars = 0;
        let totalAttempts = 0;
        let totalEffective = 0;
        let sentencesCompleted = 0;
        let startTime = null;
        let currentSentenceIndex = 0;
        let currentText = "";
        let currentPos = 0;
        let charSpans = [];
        let gameRunning = true;
        let personalBests = [];

        // DOM
        let sentenceDisplay, meterFill, liveWPMValue, avgWPMValue, tierNameEl;
        let accuracyEl, sentencesTypedEl, effectiveUnitsEl, progressPercentEl, statusText;

        function getTierCredit(wpm) {
            if (wpm <= 10) return 1;
            if (wpm <= 30) return 3.5;
            if (wpm <= 60) return 7;
            if (wpm <= 90) return 11.5;
            return 16;
        }

        function getTierName(wpm) {
            if (wpm <= 10) return "ROOKIE";
            if (wpm <= 30) return "SPEEDSTER";
            if (wpm <= 60) return "RACER";
            if (wpm <= 90) return "PRO";
            return "LEGEND";
        }

        function renderSentence() {
            currentText = sentences[currentSentenceIndex];
            sentenceDisplay.innerHTML = "";
            charSpans = [];

            for (let char of currentText) {
                const span = document.createElement('span');
                span.className = "char";
                span.textContent = char === " " ? "\u00A0" : char;
                sentenceDisplay.appendChild(span);
                charSpans.push(span);
            }
            currentPos = 0;
        }

        function handleKey(e) {
            if (!gameRunning) return;
            if (!startTime) {
                startTime = Date.now();
                statusText.textContent = "GO GO GO";
            }

            if (["Shift", "CapsLock", "Control", "Alt"].includes(e.key)) return;

            totalAttempts++;
            const expected = currentText[currentPos];

            if (e.key === expected) {
                charSpans[currentPos].classList.remove('incorrect');
                charSpans[currentPos].classList.add('correct');
                totalCorrectChars++;
                currentPos++;

                if (currentPos >= currentText.length) {
                    completeSentence();
                }
            } else if (e.key.length === 1 || e.key === " ") {
                charSpans[currentPos].classList.add('incorrect');
            }

            updateLiveStats();
        }

        function completeSentence() {
            sentencesCompleted++;
            const elapsedMin = (Date.now() - startTime) / 60000;
            const currentWPM = elapsedMin > 0 ? Math.floor((totalCorrectChars / 5) / elapsedMin) : 0;

            if (currentWPM > maxAverageWPM) maxAverageWPM = currentWPM;

            const credit = getTierCredit(maxAverageWPM);
            totalEffective += credit;

            sentencesTypedEl.textContent = `${sentencesCompleted} sentences`;
            effectiveUnitsEl.textContent = `${totalEffective.toFixed(1)} effective`;
            const percent = Math.min(100, totalEffective);
            progressPercentEl.textContent = `${percent.toFixed(0)}%`;
            meterFill.style.width = `${percent}%`;

            currentSentenceIndex = (currentSentenceIndex + 1) % sentences.length;
            renderSentence();

            if (totalEffective >= 100) showWinModal();

            updateLiveStats();
        }

        function updateLiveStats() {
            if (!startTime) return;
            const elapsedMin = (Date.now() - startTime) / 60000;
            const liveWPM = elapsedMin > 0 ? Math.floor((totalCorrectChars / 5) / elapsedMin) : 0;

            liveWPMValue.textContent = String(liveWPM).padStart(3, '0');
            avgWPMValue.textContent = String(Math.floor(maxAverageWPM)).padStart(3, '0');
            tierNameEl.textContent = getTierName(maxAverageWPM);

            // Accuracy
            const acc = totalAttempts > 0 ? Math.floor((totalCorrectChars / totalAttempts) * 100) : 100;
            accuracyEl.textContent = `${acc}%`;
        }

        function showWinModal() {
            gameRunning = false;
            document.getElementById('win-modal').style.display = 'flex';
            document.getElementById('win-text').innerHTML = `
                FINAL AVERAGE: <span style="color:#10b981; font-size:2.8rem;">${maxAverageWPM.toFixed(1)} WPM</span><br>
                TIER LOCKED: <span style="color:#10b981;">${getTierName(maxAverageWPM)}</span>
            `;
        }

        function hideWinModal() {
            document.getElementById('win-modal').style.display = 'none';
            gameRunning = true;
        }

        function saveScoreAndReset() {
            const name = prompt("🚀 Enter your nickname for the Hall of Fame (max 12 characters):", "xrey");
            if (name && name.trim()) {
                const entry = {
                    name: name.trim().substring(0, 12),
                    wpm: Math.floor(maxAverageWPM),
                    sentences: sentencesCompleted,
                    date: new Date().toLocaleDateString('en-US', {month:'short', day:'numeric'})
                };
                personalBests.push(entry);
                personalBests.sort((a, b) => b.wpm - a.wpm);
                if (personalBests.length > 10) personalBests.length = 10;
                localStorage.setItem('nitroPersonalBests', JSON.stringify(personalBests));
                alert("✅ SAVED TO YOUR PERSONAL LEADERBOARD!");
            }
            hideWinModal();
            resetGame();
        }

        function loadPersonalBests() {
            const saved = localStorage.getItem('nitroPersonalBests');
            if (saved) personalBests = JSON.parse(saved);
        }

        function renderGlobalTable() {
            let html = `<tr style="color:#67e8f9; border-bottom:2px solid #67e8f9;">
                <th style="text-align:left; padding:8px 0;">RANK</th>
                <th style="text-align:left; padding:8px 0;">NAME</th>
                <th style="text-align:right; padding:8px 0;">WPM</th>
                <th style="text-align:right; padding:8px 0;">DATE</th>
            </tr>`;
            globalLeaders.forEach(l => {
                html += `<tr style="border-bottom:1px solid #27272a;">
                    <td style="padding:8px 0;">#${l.rank}</td>
                    <td style="padding:8px 0;">${l.name}</td>
                    <td style="text-align:right; padding:8px 0; color:#67e8f9;">${l.wpm}</td>
                    <td style="text-align:right; padding:8px 0; color:#a1a1aa;">${l.date}</td>
                </tr>`;
            });
            document.getElementById('global-table').innerHTML = html;
        }

        function renderPersonalTable() {
            let html = `<tr style="color:#fbbf24; border-bottom:2px solid #fbbf24;">
                <th style="text-align:left; padding:8px 0;">RANK</th>
                <th style="text-align:left; padding:8px 0;">NAME</th>
                <th style="text-align:right; padding:8px 0;">WPM</th>
                <th style="text-align:right; padding:8px 0;">DATE</th>
            </tr>`;
            
            if (personalBests.length === 0) {
                html += `<tr><td colspan="4" style="text-align:center; padding:20px; color:#666;">No runs saved yet.<br>Fill the meter to appear here!</td></tr>`;
            } else {
                personalBests.forEach((entry, i) => {
                    html += `<tr style="border-bottom:1px solid #27272a;">
                        <td style="padding:8px 0;">#${i+1}</td>
                        <td style="padding:8px 0;">${entry.name}</td>
                        <td style="text-align:right; padding:8px 0; color:#fbbf24;">${entry.wpm}</td>
                        <td style="text-align:right; padding:8px 0; color:#a1a1aa;">${entry.date}</td>
                    </tr>`;
                });
            }
            document.getElementById('personal-table').innerHTML = html;
        }

        function showLeaderboard() {
            renderGlobalTable();
            renderPersonalTable();
            document.getElementById('leaderboard-modal').style.display = 'flex';
        }

        function hideLeaderboard() {
            document.getElementById('leaderboard-modal').style.display = 'none';
        }

        function resetGame() {
            totalCorrectChars = 0;
            totalAttempts = 0;
            totalEffective = 0;
            sentencesCompleted = 0;
            startTime = null;
            currentSentenceIndex = 0;
            maxAverageWPM = 8;
            gameRunning = true;

            meterFill.style.width = "0%";
            sentencesTypedEl.textContent = "0 sentences";
            effectiveUnitsEl.textContent = "0 effective";
            progressPercentEl.textContent = "0%";
            accuracyEl.textContent = "100%";
            renderSentence();
            updateLiveStats();
            statusText.textContent = "Waiting for first keystroke...";
        }

        function init() {
            sentenceDisplay = document.getElementById('sentence-display');
            meterFill = document.getElementById('meter-fill');
            liveWPMValue = document.getElementById('live-wpm-value');
            avgWPMValue = document.getElementById('avg-wpm-value');
            tierNameEl = document.getElementById('tier-name');
            accuracyEl = document.getElementById('accuracy');
            sentencesTypedEl = document.getElementById('sentences-typed');
            effectiveUnitsEl = document.getElementById('effective-units');
            progressPercentEl = document.getElementById('progress-percent');
            statusText = document.getElementById('status-text');

            loadPersonalBests();
            renderSentence();
            document.addEventListener('keydown', handleKey);

            setInterval(() => {
                if (gameRunning) updateLiveStats();
            }, 300);

            console.log('%cNITRO METER v3 • Leaderboard + tighter font + perfect word wrap', 'color:#10b981; font-size:18px');
        }

        window.onload = init;
    </script>
</body>
</html>
