<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NITRO METER • Type → Fill → Dominate</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        :root {
            --main: #10b981;
            --accent: #67e8f9;
            --bg: #09090b;
            --card: #18181b;
        }

        body {
            font-family: 'VT323', monospace;
            background: var(--bg);
            color: white;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }

        .char {
            transition: all 0.05s ease;
            padding: 2px 5px;
            border-radius: 4px;
            font-size: 2.6rem;
            line-height: 1.1;
            display: inline-block;
        }

        .correct { color: var(--main) !important; background: rgba(16, 185, 129, 0.25); }
        .incorrect { color: #ef4444 !important; background: rgba(239, 68, 68, 0.35); animation: shake 0.3s; }

        @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }

        #sentence-display {
            min-height: 260px;
            font-size: 2.6rem;
            line-height: 1.45;
            letter-spacing: 2px;
            white-space: pre-wrap;
            word-break: normal;
        }

        .settings-btn {
            position: absolute;
            top: 25px;
            right: 30px;
            font-size: 2rem;
            background: none;
            border: none;
            color: var(--main);
            cursor: pointer;
            z-index: 100;
        }

        .settings-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
    </style>
</head>
<body>
    <button onclick="toggleSettings()" class="settings-btn">⚙️</button>

    <div class="container">
        <!-- HEADER -->
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem; padding-bottom:1.5rem; border-bottom:2px solid #27272a;">
            <div style="display:flex; align-items:center; gap:1rem;">
                <div style="width:70px; height:70px; background:var(--main); border-radius:16px; display:flex; align-items:center; justify-content:center; font-size:3rem; box-shadow:0 0 40px var(--main);">⚡</div>
                <div>
                    <h1 style="font-size:3.8rem; font-weight:bold; letter-spacing:6px; color:var(--main);">NITRO METER</h1>
                    <p style="font-size:1.6rem; color:#a1a1aa;">type sentences • fill the meter • never downgrade</p>
                </div>
            </div>
        </div>

        <!-- METER -->
        <div style="background:var(--card); border:4px solid var(--main); border-radius:24px; padding:2rem; margin-bottom:3rem; box-shadow:0 0 40px rgba(16,185,129,0.3);">
            <div style="display:flex; justify-content:space-between; margin-bottom:1rem; font-size:1.8rem;">
                <div style="color:var(--main);">METER LEVEL</div>
                <div style="display:flex; gap:2rem; color:#d1d5db;">
                    <div id="sentences-typed">0 sentences</div>
                    <div id="effective-units" style="color:#fbbf24;">0 effective</div>
                    <div id="progress-percent" style="font-size:2.5rem; font-weight:bold;">0%</div>
                </div>
            </div>
            <div style="height:52px; background:#09090b; border:2px solid #3f3f46; border-radius:9999px; overflow:hidden;">
                <div id="meter-fill" style="height:100%; width:0%; background:linear-gradient(to right, var(--main), var(--accent)); transition: width 0.5s;"></div>
            </div>
        </div>

        <!-- TYPING AREA -->
        <div style="background:var(--card); border:2px solid #3f3f46; border-radius:24px; padding:3rem;">
            <div id="sentence-display"></div>
            
            <div style="margin-top:2.5rem; display:flex; justify-content:space-between; font-size:1.5rem; color:#a1a1aa;">
                <div>Accuracy: <span id="accuracy" style="color:var(--main); font-weight:bold;">100%</span></div>
                <div id="status-text" style="color:#fbbf24;">Waiting for first keystroke...</div>
                <div>Press any key to begin</div>
            </div>
        </div>
    </div>

    <!-- SETTINGS MODAL -->
    <div id="settings-modal" class="settings-modal">
        <div style="background:#18181b; border:6px solid var(--main); border-radius:24px; padding:2.5rem; width:90%; max-width:700px;">
            <h2 style="font-size:3.5rem; text-align:center; margin-bottom:1.5rem; color:var(--main);">SETTINGS</h2>
            
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
                <button onclick="changeTheme(0)" style="background:#10b981; color:black; padding:1.5rem; font-size:2rem; border-radius:16px;">Emerald (Default)</button>
                <button onclick="changeTheme(1)" style="background:#a855f7; color:white; padding:1.5rem; font-size:2rem; border-radius:16px;">Purple Neon</button>
                <button onclick="changeTheme(2)" style="background:#f97316; color:black; padding:1.5rem; font-size:2rem; border-radius:16px;">Orange Fire</button>
                <button onclick="changeTheme(3)" style="background:#3b82f6; color:white; padding:1.5rem; font-size:2rem; border-radius:16px;">Ice Blue</button>
                <button onclick="changeTheme(4)" style="background:#ec4899; color:white; padding:1.5rem; font-size:2rem; border-radius:16px;">Hot Pink</button>
            </div>

            <button onclick="toggleSettings()" 
                    style="margin-top:2rem; width:100%; padding:1.2rem; font-size:2rem; background:#27272a; border:none; border-radius:16px;">
                CLOSE SETTINGS
            </button>
        </div>
    </div>

    <!-- WIN MODAL -->
    <div id="win-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); align-items:center; justify-content:center; z-index:1000;">
        <div style="background:#18181b; border:4px solid var(--main); border-radius:24px; max-width:500px; width:90%; padding:3rem; text-align:center;">
            <div style="font-size:6rem; margin-bottom:1rem;">🏆</div>
            <h2 style="font-size:3.5rem; color:var(--main);">METER FILLED!</h2>
            <div id="win-text" style="font-size:2rem; margin:1.5rem 0;"></div>
            <button onclick="hideWinModal(); resetGame()" 
                    style="width:100%; padding:1.5rem; font-size:2rem; background:var(--main); color:black; border:none; border-radius:9999px; cursor:pointer; font-weight:bold;">
                START NEW RUN
            </button>
        </div>
    </div>

    <script>
        // ==================== THEMES ====================
        const themes = [
            { main: "#10b981", accent: "#67e8f9" },   // Emerald
            { main: "#a855f7", accent: "#c084fc" },   // Purple
            { main: "#f97316", accent: "#fb923c" },   // Orange
            { main: "#3b82f6", accent: "#60a5fa" },   // Blue
            { main: "#ec4899", accent: "#f472b6" }    // Pink
        ];

        function changeTheme(n) {
            document.documentElement.style.setProperty('--main', themes[n].main);
            document.documentElement.style.setProperty('--accent', themes[n].accent);
            toggleSettings();
        }

        function toggleSettings() {
            const modal = document.getElementById('settings-modal');
            modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';
        }

        // ==================== GAME CODE (same as before) ====================
        const sentences = [ /* your full sentence list */ ];
        let maxAverageWPM = 8, totalCorrectChars = 0, totalAttempts = 0, totalEffective = 0;
        let sentencesCompleted = 0, startTime = null, currentSentenceIndex = 0;
        let currentText = "", currentPos = 0, charSpans = [], gameRunning = true;

        let sentenceDisplay, meterFill, liveWPMValue, avgWPMValue, tierNameEl;
        let accuracyEl, sentencesTypedEl, effectiveUnitsEl, progressPercentEl, statusText;

        // ... (All your existing game functions: renderSentence, handleKey, completeSentence, etc.)

        function init() {
            sentenceDisplay = document.getElementById('sentence-display');
            meterFill = document.getElementById('meter-fill');
            // ... assign other elements

            renderSentence();
            document.addEventListener('keydown', handleKey);
            console.log('%cNITRO METER — Clean Version with Themes', 'color:#10b981; font-size:18px');
        }

        window.onload = init;
    </script>
</body>
</html>
